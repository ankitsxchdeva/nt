<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">

    <title>Home</title>
    <link rel="stylesheet" href="style.css">
    <link href="favicon.png" rel="shortcut icon" type="image/x-icon" />
</head>
<body>
    <div id="search">
        <input id="search-field" type="text" name="search-field"/>
    </div>
    <!-- Drifting, softly glowing Frost particles over flat Polar Night -->
    <canvas id="snow" aria-hidden="true"></canvas>
    <!-- Top-left: weather -->
    <div class="panel panel-left">
        <div class="box" id="weather">
            <div class="row">
                <div id="weather-description" class="inline"></div>
                <div class="inline">-</div>
                <div id="temp" class="inline"></div>
            </div>
        </div>
    </div>
    <!-- Top-right stack: tracked tickers -->
    <div class="panel panel-right">
        <div class="box stock" id="voo">
            <div class="ticker">VOO</div>
            <div class="price">—</div>
            <div class="change"></div>
        </div>
        <div class="box stock" id="smh">
            <div class="ticker">SMH</div>
            <div class="price">—</div>
            <div class="change"></div>
        </div>
    </div>
    <div class="container">
        <div id="clock"></div>
        <div id="date"></div>
    </div>
    <!-- Bottom-right: sunrise / sunset, super subtle -->
    <div id="sun"></div>

    <script>
        // Search on enter key event
        document.getElementById("search-field").addEventListener("keydown",  event => {
            if (event.keyCode === 13) {
                var val = document.getElementById("search-field").value;
                window.open("https://google.com/search?q=" + val);
            }
        });
        // Get current time and format
        getTime = () => {
            let date = new Date(),
                min = date.getMinutes(),
                hour = date.getHours();

            return "" +
                ((hour + 24) % 12 || 12) + ":" +
                (min < 10 ? ("0" + min) : min)
        }

        // Long-form date line under the clock
        const updateDate = () => {
            document.getElementById("date").innerHTML = new Date().toLocaleDateString(undefined, {
                weekday: "long", month: "long", day: "numeric"
            });
        }

        // Fetch an ETF/stock quote through the same Worker proxy (keeps us off
        // the data provider directly — no key in the page, no CORS headache).
        const loadStock = (symbol, boxId) => {
            let box = document.getElementById(boxId),
                priceEl = box.querySelector(".price"),
                changeEl = box.querySelector(".change");
            let xhr = new XMLHttpRequest();
            xhr.open('GET', 'https://nt-weather.ankitsachdeva001.workers.dev/?symbol=' + symbol);
            xhr.onload = () => {
                if (xhr.readyState !== 4) return;
                if (xhr.status === 200) {
                    let json = JSON.parse(xhr.responseText),
                        price = json.price,
                        prev = json.previousClose;
                    if (price == null || prev == null) { priceEl.innerHTML = "N/A"; return; }
                    let change = price - prev,
                        pct = (change / prev) * 100,
                        sign = change >= 0 ? "+" : "";
                    priceEl.innerHTML = "$" + price.toFixed(2);
                    changeEl.innerHTML = sign + change.toFixed(2) + " (" + sign + pct.toFixed(2) + "%)";
                    changeEl.className = "change " + (change >= 0 ? "up" : "down");
                } else {
                    console.error('Stock API Error:', symbol, xhr.status);
                    priceEl.innerHTML = "N/A";
                }
            }
            xhr.onerror = () => {
                console.error('Stock API Request Failed:', symbol);
                priceEl.innerHTML = "N/A";
            }
            xhr.send();
        }

        // ---- Abstract Frost particle field: drifting, glowing, twinkling points ----
        (function particles() {
            const canvas = document.getElementById("snow"),
                  ctx = canvas.getContext("2d");
            // Nord Frost + Aurora — all the light/color comes from the particles themselves
            const palette = [
                "143, 188, 187",  // frost  nord7
                "136, 192, 208",  // frost  nord8
                "129, 161, 193",  // frost  nord9
                "94, 129, 172",   // frost  nord10
                "163, 190, 140",  // aurora green  nord14
                "180, 142, 173",  // aurora purple nord15
                "235, 203, 139",  // aurora yellow nord13
                "216, 222, 233"   // snow storm    nord4
            ];
            let pts = [], w, h;
            const resize = () => {
                w = canvas.width = window.innerWidth;
                h = canvas.height = window.innerHeight;
                const count = Math.round((w * h) / 17000);
                pts = Array.from({ length: count }, (_, i) => {
                    const orb = i % 7 === 0;                  // ~1 in 7 is a bigger glowing orb
                    return {
                        x: Math.random() * w,
                        y: Math.random() * h,
                        r: orb ? Math.random() * 2.2 + 2.4 : Math.random() * 1.6 + 0.8,
                        a: Math.random() * Math.PI * 2,       // drift heading
                        v: Math.random() * 0.18 + 0.05,       // drift speed
                        c: palette[Math.floor(Math.random() * palette.length)],
                        base: orb ? Math.random() * 0.3 + 0.55 : Math.random() * 0.4 + 0.4,
                        tw: Math.random() * 0.025 + 0.008,    // twinkle speed
                        ph: Math.random() * Math.PI * 2,      // twinkle phase
                        glow: orb ? 8 : 6                     // glow radius multiplier
                    };
                });
            };
            const draw = () => {
                ctx.clearRect(0, 0, w, h);
                for (const p of pts) {
                    p.ph += p.tw;
                    const o = p.base + Math.sin(p.ph) * 0.25;
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
                    ctx.fillStyle = "rgba(" + p.c + ", " + Math.min(Math.max(o, 0.08), 1) + ")";
                    ctx.shadowColor = "rgba(" + p.c + ", 1)";
                    ctx.shadowBlur = p.r * p.glow;            // the glow lives on the particle
                    ctx.fill();
                    p.x += Math.cos(p.a) * p.v;
                    p.y += Math.sin(p.a) * p.v;
                    if (p.x < -10) p.x = w + 10;
                    if (p.x > w + 10) p.x = -10;
                    if (p.y < -10) p.y = h + 10;
                    if (p.y > h + 10) p.y = -10;
                }
                ctx.shadowBlur = 0;
                requestAnimationFrame(draw);
            };
            const drawStatic = () => {
                ctx.clearRect(0, 0, w, h);
                for (const p of pts) {
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
                    ctx.fillStyle = "rgba(" + p.c + ", " + p.base + ")";
                    ctx.shadowColor = "rgba(" + p.c + ", 1)";
                    ctx.shadowBlur = p.r * p.glow;
                    ctx.fill();
                }
                ctx.shadowBlur = 0;
            };
            window.addEventListener("resize", resize);
            resize();
            if (window.matchMedia("(prefers-reduced-motion: reduce)").matches) drawStatic();
            else draw();
        })();

        window.onload = () => {
            let xhr = new XMLHttpRequest();
            // Weather is fetched through a Cloudflare Worker proxy that keeps the
            // OpenWeatherMap API key as a secret, so the key never ships to the browser.
            xhr.open('GET', 'https://nt-weather.ankitsachdeva001.workers.dev');
            xhr.onload = () => {
                if (xhr.readyState === 4) {
                    if (xhr.status === 200) {
                        let json = JSON.parse(xhr.responseText);
                        console.log(json);
                        document.getElementById("temp").innerHTML = json.main.temp.toFixed(0) + "°";
                        document.getElementById("weather-description").innerHTML = json.weather[0].description;
                        // Sunrise / sunset come free with the same response (Unix UTC seconds)
                        if (json.sys && json.sys.sunrise && json.sys.sunset) {
                            const fmtSun = ts => {
                                let d = new Date(ts * 1000),
                                    h = d.getHours(), m = d.getMinutes();
                                return ((h + 24) % 12 || 12) + ":" + (m < 10 ? "0" + m : m);
                            };
                            document.getElementById("sun").innerHTML =
                                "☀ " + fmtSun(json.sys.sunrise) + " · ☾ " + fmtSun(json.sys.sunset);
                        }
                    } else {
                        console.error('Weather API Error:', xhr.status);
                        document.getElementById("temp").innerHTML = "N/A";
                        document.getElementById("weather-description").innerHTML = "Weather unavailable";
                    }
                }
            }
            xhr.onerror = () => {
                console.error('Weather API Request Failed');
                document.getElementById("temp").innerHTML = "N/A";
                document.getElementById("weather-description").innerHTML = "Weather unavailable";
            }
            xhr.send();
            // Tracked tickers, refreshed alongside the page load
            loadStock("VOO", "voo");
            loadStock("SMH", "smh");
            // Set up the clock + date
            document.getElementById("clock").innerHTML = getTime();
            updateDate();
            // Set clock interval to tick clock
            setInterval( () => {
                document.getElementById("clock").innerHTML = getTime();
                updateDate();
            },1000);
        }

        document.addEventListener("keydown", event => {
            if (event.keyCode == 32) {          // Spacebar code to open search
                document.getElementById('search').style.display = 'flex';
                document.getElementById('search-field').focus();
            } else if (event.keyCode == 27) {   // Esc to close search
                document.getElementById('search-field').value = '';
                document.getElementById('search-field').blur();
                document.getElementById('search').style.display = 'none';
            }
        });
    </script>
</body>
</html>
