<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">

    <title>Home</title>
    <link rel="stylesheet" href="style.css">
    <link href="favicon.png" rel="shortcut icon" type="image/x-icon" />
</head>
<body>
    <div id="search">
        <input id="search-field" type="text" name="search-field"/>
    </div>
    <!-- Aurora borealis: drifting Frost + Aurora light curtains over the Polar Night -->
    <div class="aurora" aria-hidden="true">
        <span></span><span></span><span></span><span></span><span></span>
    </div>
    <!-- Drifting snow (Snow Storm) -->
    <canvas id="snow" aria-hidden="true"></canvas>
    <div class="container">
        <div id="greeting"></div>
        <div id="clock"></div>
        <div id="date"></div>
        <div class="weather-container">
            <div class="row">
                <div id="weather-description"class="inline"></div>
                <div class="inline">-</div>
                <div id="temp" class="inline"></div>
            </div>
        </div>
    </div>

    <script>
        // Search on enter key event
        document.getElementById("search-field").addEventListener("keydown",  event => {
            if (event.keyCode === 13) {
                var val = document.getElementById("search-field").value;
                window.open("https://google.com/search?q=" + val);
            }
        });
        // Get current time and format
        getTime = () => {
            let date = new Date(),
                min = date.getMinutes(),
                hour = date.getHours();

            return "" +
                ((hour + 24) % 12 || 12) + ":" +
                (min < 10 ? ("0" + min) : min)
        }

        // Greeting based on the hour + a long-form date line
        const updateDateGreeting = () => {
            let now = new Date(),
                h = now.getHours(),
                greeting = h < 5 ? "Good night" :
                           h < 12 ? "Good morning" :
                           h < 18 ? "Good afternoon" : "Good evening";
            document.getElementById("greeting").innerHTML = greeting;
            document.getElementById("date").innerHTML = now.toLocaleDateString(undefined, {
                weekday: "long", month: "long", day: "numeric"
            });
        }

        // ---- Drifting snow (Nord "Snow Storm") ----
        (function snow() {
            const canvas = document.getElementById("snow"),
                  ctx = canvas.getContext("2d");
            let flakes = [], w, h;
            const resize = () => {
                w = canvas.width = window.innerWidth;
                h = canvas.height = window.innerHeight;
                const count = Math.round((w * h) / 22000);
                flakes = Array.from({ length: count }, () => ({
                    x: Math.random() * w,
                    y: Math.random() * h,
                    r: Math.random() * 2.2 + 0.6,
                    sx: Math.random() * 0.4 - 0.2,
                    sy: Math.random() * 0.7 + 0.25,
                    o: Math.random() * 0.5 + 0.2
                }));
            };
            const draw = () => {
                ctx.clearRect(0, 0, w, h);
                for (const f of flakes) {
                    ctx.beginPath();
                    ctx.arc(f.x, f.y, f.r, 0, Math.PI * 2);
                    ctx.fillStyle = "rgba(236, 239, 244, " + f.o + ")";
                    ctx.fill();
                    f.x += f.sx;
                    f.y += f.sy;
                    if (f.y > h + 5) { f.y = -5; f.x = Math.random() * w; }
                    if (f.x > w + 5) f.x = -5;
                    if (f.x < -5) f.x = w + 5;
                }
                requestAnimationFrame(draw);
            };
            window.addEventListener("resize", resize);
            resize();
            if (!window.matchMedia("(prefers-reduced-motion: reduce)").matches) draw();
        })();

        window.onload = () => {
            let xhr = new XMLHttpRequest();
            // Weather is fetched through a Cloudflare Worker proxy that keeps the
            // OpenWeatherMap API key as a secret, so the key never ships to the browser.
            xhr.open('GET', 'https://nt-weather.ankitsachdeva001.workers.dev');
            xhr.onload = () => {
                if (xhr.readyState === 4) {
                    if (xhr.status === 200) {
                        let json = JSON.parse(xhr.responseText);
                        console.log(json);
                        document.getElementById("temp").innerHTML = json.main.temp.toFixed(0) + "°";
                        document.getElementById("weather-description").innerHTML = json.weather[0].description;
                        // Add city name display
                        let cityName = document.createElement('div');
                        cityName.className = 'city-name';
                        cityName.innerHTML = `${json.name}, TX`;
                        document.querySelector('.weather-container').appendChild(cityName);
                    } else {
                        console.error('Weather API Error:', xhr.status);
                        document.getElementById("temp").innerHTML = "N/A";
                        document.getElementById("weather-description").innerHTML = "Weather unavailable";
                    }
                }
            }
            xhr.onerror = () => {
                console.error('Weather API Request Failed');
                document.getElementById("temp").innerHTML = "N/A";
                document.getElementById("weather-description").innerHTML = "Weather unavailable";
            }
            xhr.send();
            // Set up the clock + date/greeting
            document.getElementById("clock").innerHTML = getTime();
            updateDateGreeting();
            // Set clock interval to tick clock
            setInterval( () => {
                document.getElementById("clock").innerHTML = getTime();
                updateDateGreeting();
            },1000);
        }

        document.addEventListener("keydown", event => {
            if (event.keyCode == 32) {          // Spacebar code to open search
                document.getElementById('search').style.display = 'flex';
                document.getElementById('search-field').focus();
            } else if (event.keyCode == 27) {   // Esc to close search
                document.getElementById('search-field').value = '';
                document.getElementById('search-field').blur();
                document.getElementById('search').style.display = 'none';
            }
        });
    </script>
</body>
</html>
